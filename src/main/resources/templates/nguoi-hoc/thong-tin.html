<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật thông tin - Người học</title>
    <link rel="icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <!-- Dark mode script must load first -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            
            window.toggleDarkMode = function() {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="h-full bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
    <!-- Navigation -->
    <nav class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg shadow-lg sticky top-0 z-50 border-b border-gray-200/50 dark:border-gray-700/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-4">
                    <a href="/nguoi-hoc/dashboard" class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">
                        <i class="fas fa-arrow-left mr-2"></i>Quay lại
                    </a>
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-green-500 to-emerald-600 flex items-center justify-center shadow-lg">
                            <i class="fas fa-user-graduate text-white text-lg"></i>
                        </div>
                        <span class="text-xl font-bold text-gray-800 dark:text-white ml-3">Cập nhật thông tin</span>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleDarkMode()" 
                            class="p-2.5 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">
                        <i class="fas fa-moon dark:hidden text-lg"></i>
                        <i class="fas fa-sun hidden dark:inline text-lg"></i>
                    </button>
                    <div class="flex items-center space-x-3 px-4 py-2 bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-gray-700 dark:to-gray-600 rounded-lg">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 flex items-center justify-center text-white text-xs font-bold">
                            <span th:text="${#strings.substring(nguoiDung?.tenDangNhap ?: 'U', 0, 1).toUpperCase()}"></span>
                        </div>
                        <span class="text-sm font-medium text-gray-700 dark:text-gray-200" th:text="${nguoiDung?.tenDangNhap ?: 'Người học'}"></span>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Flash Messages -->
        <div th:if="${success}" class="mb-6 p-4 bg-green-100 dark:bg-green-900/30 border border-green-400 dark:border-green-700 text-green-700 dark:text-green-300 rounded-lg flex items-center">
            <i class="fas fa-check-circle mr-2"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="mb-6 p-4 bg-red-100 dark:bg-red-900/30 border border-red-400 dark:border-red-700 text-red-700 dark:text-red-300 rounded-lg flex items-center">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span th:text="${error}"></span>
        </div>
        
        <!-- Form Card -->
        <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-2xl shadow-xl border border-gray-200/50 dark:border-gray-700/50 overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-white">
                <h1 class="text-2xl font-bold flex items-center">
                    <i class="fas fa-user-edit mr-3"></i>
                    Cập nhật thông tin cá nhân
                </h1>
                <p class="text-blue-100 mt-2">Vui lòng điền đầy đủ thông tin bên dưới</p>
            </div>
            
            <!-- Form -->
            <form th:action="@{/nguoi-hoc/thong-tin}" 
                  th:object="${dto}" 
                  method="post"
                  class="p-8 space-y-6">
                
                <input type="hidden" th:field="*{nguoiHocId}">
                
                <!-- Tên đăng nhập (readonly) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        <i class="fas fa-user mr-2 text-blue-500"></i>Tên đăng nhập
                    </label>
                    <input type="text" 
                           th:value="${nguoiDung?.tenDangNhap}"
                           readonly
                           class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 cursor-not-allowed">
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Tên đăng nhập không thể thay đổi</p>
                </div>
                
                <!-- Mật khẩu (optional) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        <i class="fas fa-lock mr-2 text-blue-500"></i>Mật khẩu mới (để trống nếu không muốn đổi)
                    </label>
                    <input type="password" 
                           th:field="*{matKhau}"
                           autocomplete="new-password"
                           class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Chỉ điền nếu muốn thay đổi mật khẩu</p>
                </div>
                
                <!-- Giới tính -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        <i class="fas fa-venus-mars mr-2 text-blue-500"></i>Giới tính <span class="text-red-500">*</span>
                    </label>
                    <div class="flex space-x-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" 
                                   th:field="*{gioiTinh}" 
                                   th:value="true"
                                   class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <span class="ml-2 text-gray-700 dark:text-gray-300">Nam</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" 
                                   th:field="*{gioiTinh}" 
                                   th:value="false"
                                   class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <span class="ml-2 text-gray-700 dark:text-gray-300">Nữ</span>
                        </label>
                    </div>
                    <p th:if="${#fields.hasErrors('gioiTinh')}" 
                       th:errors="*{gioiTinh}" 
                       class="text-red-600 dark:text-red-400 text-sm mt-1"></p>
                </div>
                
                <!-- Năm sinh -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        <i class="fas fa-calendar-alt mr-2 text-blue-500"></i>Năm sinh <span class="text-red-500">*</span>
                    </label>
                    <input type="number" 
                           th:field="*{namSinh}"
                           min="1950" 
                           max="2010"
                           class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    <p th:if="${#fields.hasErrors('namSinh')}" 
                       th:errors="*{namSinh}" 
                       class="text-red-600 dark:text-red-400 text-sm mt-1"></p>
                </div>
                
                <!-- Khoa -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        <i class="fas fa-building mr-2 text-blue-500"></i>Khoa <span class="text-red-500">*</span>
                    </label>
                    <select th:field="*{khoaId}"
                            class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                        <option value="">-- Chọn khoa --</option>
                        <option th:each="khoa : ${danhSachKhoa}" 
                                th:value="${khoa.khoaId}" 
                                th:text="${khoa.tenKhoa}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('khoaId')}" 
                       th:errors="*{khoaId}" 
                       class="text-red-600 dark:text-red-400 text-sm mt-1"></p>
                </div>
                
                <!-- Ngành học -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        <i class="fas fa-book-reader mr-2 text-blue-500"></i>Ngành học
                    </label>
                    <input type="text" 
                           th:field="*{nganhHoc}"
                           class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                </div>
                
                <!-- Khóa học -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        <i class="fas fa-graduation-cap mr-2 text-blue-500"></i>Khóa học
                    </label>
                    <input type="text" 
                           th:field="*{khoaHoc}"
                           class="w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                </div>
                
                <!-- Buttons -->
                <div class="flex justify-end space-x-4 pt-6 border-t border-gray-200 dark:border-gray-700">
                    <a href="/nguoi-hoc/dashboard" 
                       class="px-6 py-3 border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 font-medium transition-all">
                        <i class="fas fa-times mr-2"></i>Hủy
                    </a>
                    <button type="submit" 
                            class="px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-xl hover:from-green-600 hover:to-emerald-700 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all font-medium">
                        <i class="fas fa-save mr-2"></i>Lưu thông tin
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
