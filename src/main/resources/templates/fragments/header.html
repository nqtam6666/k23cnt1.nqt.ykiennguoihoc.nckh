<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/meo.ico}">
</head>
<body>
    <!-- Header Fragment -->
    <th:block th:fragment="header">
        <nav class="bg-white dark:bg-gray-800 shadow-lg">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-4">
                        <a th:href="${backUrl} ?: '/admin/dashboard'" class="text-blue-600 dark:text-blue-400 hover:text-blue-800">
                            <i class="fas fa-arrow-left text-xl"></i>
                        </a>
                        <i th:classappend="${iconClass} ?: 'fas fa-home'" th:class="${iconClass} + ' text-blue-600 dark:text-blue-400 text-xl mr-2'"></i>
                        <span class="text-xl font-bold text-gray-800 dark:text-white" th:text="${pageTitle} ?: 'Dashboard'"></span>
                    </div>
                    <div class="flex items-center space-x-4" th:if="${nguoiDung != null}">
                        <span class="text-gray-700 dark:text-gray-200" th:text="${nguoiDung?.tenDangNhap}"></span>
                        <a href="/auth/logout" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                            <i class="fas fa-sign-out-alt mr-2"></i>Đăng xuất
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </th:block>
    
    <!-- Admin Header Fragment -->
    <th:block th:fragment="adminHeader(backUrl, pageTitle, iconClass)">
        <nav class="bg-white dark:bg-gray-800 shadow-lg">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-4">
                        <a th:href="${backUrl}" class="text-blue-600 dark:text-blue-400 hover:text-blue-800">
                            <i class="fas fa-arrow-left text-xl"></i>
                        </a>
                        <i th:class="${iconClass} + ' text-blue-600 dark:text-blue-400 text-xl mr-2'"></i>
                        <span class="text-xl font-bold text-gray-800 dark:text-white" th:text="${pageTitle}"></span>
                    </div>
                    <div class="flex items-center space-x-4" th:if="${nguoiDung != null}">
                        <span class="text-gray-700 dark:text-gray-200" th:text="${nguoiDung?.tenDangNhap}"></span>
                        <a href="/auth/logout" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                            <i class="fas fa-sign-out-alt mr-2"></i>Đăng xuất
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </th:block>
</body>
</html>
