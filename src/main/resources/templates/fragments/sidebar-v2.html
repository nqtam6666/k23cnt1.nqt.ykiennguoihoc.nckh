<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Modern Sidebar Fragment v3 -->
    <th:block th:fragment="modernSidebar">
        <aside class="sidebar-neo">
            <!-- Brand -->
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <span class="sidebar-brand-text text-gradient">NTU Feedback</span>
            </div>

            <!-- User Info -->
            <div class="sidebar-user" th:if="${nguoiDung}">
                <div class="sidebar-user-card">
                    <div class="sidebar-avatar">
                        <span th:text="${#strings.substring(nguoiDung?.tenDangNhap, 0, 1).toUpperCase()}">A</span>
                    </div>
                    <div style="min-width:0; flex:1;">
                        <div class="sidebar-user-name" th:text="${nguoiDung?.tenDangNhap}">Admin</div>
                        <div class="sidebar-user-role">Quản trị viên</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="sidebar-nav">
                <!-- Section: Tổng quan -->
                <div class="sidebar-section">Tổng quan</div>

                <a href="/admin/dashboard"
                   th:classappend="${#httpServletRequest != null && #httpServletRequest.requestURI != null && #strings.contains(#httpServletRequest.requestURI, '/admin/dashboard') && !#strings.contains(#httpServletRequest.requestURI, '/admin/khao-sat') && !#strings.contains(#httpServletRequest.requestURI, '/admin/giang-vien') && !#strings.contains(#httpServletRequest.requestURI, '/admin/hoc-phan') && !#strings.contains(#httpServletRequest.requestURI, '/admin/phan-cong') && !#strings.contains(#httpServletRequest.requestURI, '/admin/phan-hoi') && !#strings.contains(#httpServletRequest.requestURI, '/admin/nguoi-dung') ? 'sidebar-link-active' : ''}"
                   class="sidebar-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>

                <!-- Section: Quản lý -->
                <div class="sidebar-section" style="margin-top:0.75rem;">Quản lý</div>

                <a href="/admin/khao-sat"
                   th:classappend="${#httpServletRequest != null && #httpServletRequest.requestURI != null && #strings.contains(#httpServletRequest.requestURI, '/admin/khao-sat') ? 'sidebar-link-active' : ''}"
                   class="sidebar-link">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Khảo sát</span>
                </a>

                <a href="/admin/giang-vien"
                   th:classappend="${#httpServletRequest != null && #httpServletRequest.requestURI != null && #strings.contains(#httpServletRequest.requestURI, '/admin/giang-vien') ? 'sidebar-link-active' : ''}"
                   class="sidebar-link">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>Giảng viên</span>
                </a>

                <a href="/admin/nguoi-dung"
                   th:classappend="${#httpServletRequest != null && #httpServletRequest.requestURI != null && #strings.contains(#httpServletRequest.requestURI, '/admin/nguoi-dung') ? 'sidebar-link-active' : ''}"
                   class="sidebar-link">
                    <i class="fas fa-users"></i>
                    <span>Người dùng</span>
                </a>

                <a href="/admin/hoc-phan"
                   th:classappend="${#httpServletRequest != null && #httpServletRequest.requestURI != null && #strings.contains(#httpServletRequest.requestURI, '/admin/hoc-phan') ? 'sidebar-link-active' : ''}"
                   class="sidebar-link">
                    <i class="fas fa-book"></i>
                    <span>Học phần</span>
                </a>

                <a href="/admin/phan-cong"
                   th:classappend="${#httpServletRequest != null && #httpServletRequest.requestURI != null && #strings.contains(#httpServletRequest.requestURI, '/admin/phan-cong') ? 'sidebar-link-active' : ''}"
                   class="sidebar-link">
                    <i class="fas fa-tasks"></i>
                    <span>Phân công</span>
                </a>

                <a href="/admin/phan-hoi"
                   th:classappend="${#httpServletRequest != null && #httpServletRequest.requestURI != null && #strings.contains(#httpServletRequest.requestURI, '/admin/phan-hoi') ? 'sidebar-link-active' : ''}"
                   class="sidebar-link">
                    <i class="fas fa-comments"></i>
                    <span>Phản hồi</span>
                </a>

                <!-- Section: Hệ thống -->
                <div class="sidebar-section" style="margin-top:0.75rem;">Hệ thống</div>

                <a href="/admin/vai-tro"
                   th:classappend="${#httpServletRequest != null && #httpServletRequest.requestURI != null && #strings.contains(#httpServletRequest.requestURI, '/admin/vai-tro') ? 'sidebar-link-active' : ''}"
                   class="sidebar-link">
                    <i class="fas fa-shield-alt"></i>
                    <span>Vai trò & Quyền</span>
                </a>
            </nav>

            <!-- Footer: Logout -->
            <div class="sidebar-footer">
                <a href="/auth/logout" class="sidebar-link" style="color:#ef4444;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng xuất</span>
                </a>
            </div>
        </aside>
    </th:block>
</body>
</html>
