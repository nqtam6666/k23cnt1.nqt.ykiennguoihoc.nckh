<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Hệ thống Phản hồi</title>
    <link rel="icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <!-- Dark mode script must load first -->
    <script src="/js/dark-mode.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="h-full flex items-center justify-center p-4 relative" 
      style="background-image: url('/img/325479295_1542156529615912_8399569358052823118_n - Copy.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <!-- Overlay để làm tối nền và tăng độ tương phản -->
    <div class="absolute inset-0 bg-black/40 dark:bg-black/60"></div>
    
    <div class="relative z-10 bg-white/95 dark:bg-gray-800/95 backdrop-blur-lg rounded-lg shadow-2xl w-full max-w-md p-8">
        <!-- Dark Mode Toggle Button -->
        <div class="absolute top-4 right-4">
            <button onclick="toggleDarkMode()" 
                    class="p-2.5 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm">
                <i class="fas fa-moon dark:hidden text-lg"></i>
                <i class="fas fa-sun hidden dark:inline text-lg"></i>
            </button>
        </div>
        
        <div class="text-center mb-8">
            <i class="fas fa-user-plus text-4xl text-blue-600 dark:text-blue-400 mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800 dark:text-white">Đăng ký tài khoản</h1>
            <p class="text-gray-600 dark:text-gray-400 mt-2">Tạo tài khoản mới</p>
        </div>
        
        <div th:if="${success}" class="mb-4 p-4 bg-green-100 dark:bg-green-900 border border-green-400 dark:border-green-700 text-green-700 dark:text-green-300 rounded-lg">
            <i class="fas fa-check-circle mr-2"></i>
            <span th:text="${success}"></span>
        </div>
        
        <div th:if="${error}" class="mb-4 p-4 bg-red-100 dark:bg-red-900 border border-red-400 dark:border-red-700 text-red-700 dark:text-red-300 rounded-lg">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span th:text="${error}"></span>
        </div>
        
        <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post" class="space-y-6">
            <div>
                <label for="tenDangNhap" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    <i class="fas fa-user mr-2"></i>Tên đăng nhập <span class="text-red-500">*</span>
                </label>
                <input type="text" 
                       id="tenDangNhap" 
                       th:field="*{tenDangNhap}"
                       class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                       placeholder="Nhập tên đăng nhập (3-50 ký tự)"
                       th:classappend="${#fields.hasErrors('tenDangNhap')} ? 'border-red-500'">
                <p th:if="${#fields.hasErrors('tenDangNhap')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                    <span th:errors="*{tenDangNhap}"></span>
                </p>
            </div>
            
            <div>
                <label for="matKhau" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    <i class="fas fa-lock mr-2"></i>Mật khẩu <span class="text-red-500">*</span>
                </label>
                <input type="password" 
                       id="matKhau" 
                       th:field="*{matKhau}"
                       class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                       placeholder="Nhập mật khẩu (ít nhất 6 ký tự)"
                       autocomplete="new-password"
                       th:classappend="${#fields.hasErrors('matKhau')} ? 'border-red-500'">
                <p th:if="${#fields.hasErrors('matKhau')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                    <span th:errors="*{matKhau}"></span>
                </p>
            </div>
            
            <div>
                <label for="xacNhanMatKhau" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    <i class="fas fa-lock mr-2"></i>Xác nhận mật khẩu <span class="text-red-500">*</span>
                </label>
                <input type="password" 
                       id="xacNhanMatKhau" 
                       th:field="*{xacNhanMatKhau}"
                       class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                       placeholder="Nhập lại mật khẩu"
                       autocomplete="new-password"
                       th:classappend="${#fields.hasErrors('xacNhanMatKhau')} ? 'border-red-500'">
                <p th:if="${#fields.hasErrors('xacNhanMatKhau')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                    <span th:errors="*{xacNhanMatKhau}"></span>
                </p>
            </div>
            
            <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-4">
                <p class="text-sm text-blue-800 dark:text-blue-300">
                    <i class="fas fa-info-circle mr-2"></i>
                    <strong>Lưu ý:</strong> Tài khoản mới sẽ được tạo với vai trò <strong>Sinh viên</strong>. Admin có thể thay đổi vai trò sau khi đăng ký.
                </p>
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transition-all flex items-center justify-center shadow-lg">
                <i class="fas fa-user-plus mr-2"></i>
                Đăng ký
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600 dark:text-gray-400">
                Đã có tài khoản? 
                <a href="/auth/login" class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 font-semibold">
                    <i class="fas fa-sign-in-alt mr-1"></i>Đăng nhập ngay
                </a>
            </p>
        </div>
        
        <div class="mt-4 text-center text-sm text-gray-600 dark:text-gray-400">
            <p>Hệ thống Nghiên cứu Khoa học - K23CNT1</p>
            <p class="mt-1">Nguyễn Quang Tâm</p>
        </div>
    </div>
</body>
</html>
