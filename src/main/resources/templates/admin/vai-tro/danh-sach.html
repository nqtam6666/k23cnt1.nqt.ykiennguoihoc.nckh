<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Vai trò - Admin</title>
    <link rel="icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="/js/dark-mode.js"></script>
    <style>
        * { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="h-full bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar-v2 :: modernSidebar}"></div>
    
    <!-- Main Content -->
    <div class="page-content min-h-screen">
        <!-- Top Bar -->
        <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm">
            <div class="px-8 py-5">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">Quản lý Vai trò & Phân quyền</h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Cấu hình các vai trò và quyền hạn trong hệ thống</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button onclick="toggleDarkMode()" 
                                class="p-2.5 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">
                            <i class="fas fa-moon dark:hidden text-lg"></i>
                            <i class="fas fa-sun hidden dark:inline text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>
        
        <!-- Page Content -->
        <main class="p-8">
            <!-- Flash Messages -->
            <div th:replace="~{fragments/messages :: messages}"></div>
            
            <!-- Header -->
            <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Danh sách Vai trò</h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" 
                       th:text="'Tổng cộng: ' + ${#lists.size(danhSachVaiTro)} + ' vai trò'">Tổng cộng: 0 vai trò</p>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="/admin/vai-tro/them" 
                       class="px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-xl hover:from-blue-600 hover:to-indigo-700 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200 flex items-center font-medium">
                        <i class="fas fa-plus mr-2"></i>Thêm vai trò mới
                    </a>
                </div>
            </div>
            
            <!-- Table Card -->
            <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-2xl shadow-xl border border-gray-200/50 dark:border-gray-700/50 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                        <thead class="bg-gradient-to-r from-gray-50 to-gray-100 dark:from-gray-700 dark:to-gray-600">
                            <tr>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">ID</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Tên Vai trò (Mã)</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Mô tả</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Số quyền hạn</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Mặc định</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                            <tr th:each="vt : ${danhSachVaiTro}" class="hover:bg-blue-50/50 dark:hover:bg-gray-700/50 transition-colors">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-semibold text-sm" th:text="${vt.vaiTroId}"></span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <i class="fas fa-shield-alt text-indigo-500 mr-2 text-lg"></i>
                                        <span class="text-sm font-bold text-gray-900 dark:text-white" th:text="${vt.tenVaiTro}"></span>
                                    </div>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="text-sm text-gray-600 dark:text-gray-300" th:text="${vt.moTa}"></span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-3 py-1 inline-flex items-center text-xs font-semibold rounded-full bg-indigo-100 dark:bg-indigo-900/30 text-indigo-800 dark:text-indigo-300">
                                        <i class="fas fa-key mr-1.5 flex-shrink-0"></i>
                                        <span th:text="${#lists.size(vt.danhSachQuyen)} + ' quyền'"></span>
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span th:if="${vt.macDinh}" class="px-3 py-1 inline-flex items-center text-xs font-semibold rounded-full bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300">
                                        <i class="fas fa-check-circle mr-1.5"></i> Có
                                    </span>
                                    <span th:unless="${vt.macDinh}" class="text-gray-400 dark:text-gray-500">-</span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                    <div class="flex items-center space-x-2">
                                        <a th:href="@{/admin/vai-tro/sua/{id}(id=${vt.vaiTroId})}" 
                                           class="inline-flex items-center px-3 py-1.5 rounded-lg bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 hover:bg-blue-200 dark:hover:bg-blue-800 transition-colors">
                                            <i class="fas fa-edit text-xs mr-1"></i>Sửa
                                        </a>
                                        <form th:if="${vt.tenVaiTro != 'ROLE_ADMIN'}" 
                                              th:action="@{/admin/vai-tro/xoa/{id}(id=${vt.vaiTroId})}" 
                                              method="post" 
                                              class="inline"
                                              onsubmit="return confirm('Bạn có chắc chắn muốn xóa vai trò này? Người dùng đang có vai trò này sẽ mất các quyền tương ứng!');">
                                            <button type="submit" class="inline-flex items-center px-3 py-1.5 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 hover:bg-red-200 dark:hover:bg-red-800 transition-colors">
                                                <i class="fas fa-trash text-xs mr-1"></i>Xóa
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(danhSachVaiTro)}">
                                <td colspan="6" class="px-6 py-12 text-center">
                                    <div class="flex flex-col items-center">
                                        <i class="fas fa-shield-slash text-4xl text-gray-400 dark:text-gray-500 mb-4"></i>
                                        <p class="text-gray-500 dark:text-gray-400 mb-2">Chưa có vai trò nào</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
