<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Phản hồi - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="/js/dark-mode.js"></script>
    <style>
        * { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="h-full bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar-v2 :: modernSidebar}"></div>
    
    <!-- Main Content -->
    <div class="page-content min-h-screen">
        <!-- Top Bar -->
        <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm">
            <div class="px-8 py-5">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold bg-gradient-to-r from-red-600 to-rose-600 bg-clip-text text-transparent">Quản lý Phản hồi</h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Xem và quản lý phản hồi từ người học</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button onclick="toggleDarkMode()" 
                                class="p-2.5 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">
                            <i class="fas fa-moon dark:hidden text-lg"></i>
                            <i class="fas fa-sun hidden dark:inline text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>
        
        <!-- Page Content -->
        <main class="p-8">
            <!-- Flash Messages -->
            <div th:replace="~{fragments/messages :: messages}"></div>
            
            <!-- Header -->
            <div class="mb-6 flex flex-col gap-4">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Danh sách Phản hồi</h2>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" 
                           th:text="'Tổng cộng: ' + ${pageInfo?.totalElements ?: 0} + ' phản hồi'">Tổng cộng: 0 phản hồi</p>
                    </div>
                </div>
                
                <!-- Search and Filter Form -->
                <form id="filterForm" method="get" action="/admin/phan-hoi" class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-xl shadow-lg border border-gray-200/50 dark:border-gray-700/50 p-4">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- Search Keyword -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                                <i class="fas fa-search mr-2 text-red-500"></i>Tìm kiếm
                            </label>
                            <input type="text" 
                                   id="keywordInput"
                                   name="keyword" 
                                   th:value="${keyword}"
                                   placeholder="Tên đăng nhập, tên khảo sát..."
                                   class="w-full px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                        </div>
                        
                        <!-- Filter by KhaoSat -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                                <i class="fas fa-clipboard-list mr-2 text-red-500"></i>Khảo sát
                            </label>
                            <select name="khaoSatId" 
                                    id="khaoSatIdSelect"
                                    class="w-full px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                                <option value="">Tất cả</option>
                                <option th:each="ks : ${danhSachKhaoSat}" 
                                        th:value="${ks.khaoSatId}" 
                                        th:text="${ks.tenKhaoSat}"
                                        th:selected="${khaoSatId != null and khaoSatId == ks.khaoSatId}"></option>
                            </select>
                        </div>
                        
                        <!-- Reset Button -->
                        <div class="flex items-end">
                            <a href="/admin/phan-hoi" 
                               class="w-full px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-all font-medium text-center">
                                <i class="fas fa-redo mr-2"></i>Đặt lại
                            </a>
                        </div>
                    </div>
                    <input type="hidden" name="page" value="0">
                    <input type="hidden" name="size" th:value="${pageInfo?.pageSize ?: 10}">
                </form>
                
                <script>
                    // Auto-submit form khi thay đổi giá trị
                    (function() {
                        const form = document.getElementById('filterForm');
                        const keywordInput = document.getElementById('keywordInput');
                        const khaoSatIdSelect = document.getElementById('khaoSatIdSelect');
                        
                        let keywordTimeout;
                        
                        // Tự động submit khi thay đổi select
                        khaoSatIdSelect.addEventListener('change', function() {
                            form.querySelector('input[name="page"]').value = '0';
                            form.submit();
                        });
                        
                        // Debounce cho input text (submit sau 500ms khi ngừng gõ)
                        keywordInput.addEventListener('input', function() {
                            clearTimeout(keywordTimeout);
                            keywordTimeout = setTimeout(function() {
                                form.querySelector('input[name="page"]').value = '0';
                                form.submit();
                            }, 500);
                        });
                    })();
                </script>
            </div>
            
            <!-- Table Card -->
            <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-2xl shadow-xl border border-gray-200/50 dark:border-gray-700/50 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                        <thead class="bg-gradient-to-r from-gray-50 to-gray-100 dark:from-gray-700 dark:to-gray-600">
                            <tr>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">ID</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Người học</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Khảo sát</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Thời gian gửi</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Số câu trả lời</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                            <tr th:each="phanHoi : ${pageInfo?.content ?: {}}" class="hover:bg-red-50/50 dark:hover:bg-gray-700/50 transition-colors">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 font-semibold text-sm" th:text="${phanHoi.phanHoiId}"></span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white text-xs font-bold mr-2">
                                            <span th:text="${phanHoi.nguoiHoc?.nguoiDung?.tenDangNhap != null ? #strings.substring(phanHoi.nguoiHoc.nguoiDung.tenDangNhap, 0, 1).toUpperCase() : '?'}"></span>
                                        </div>
                                        <span class="text-sm font-medium text-gray-900 dark:text-white" th:text="${phanHoi.nguoiHoc?.nguoiDung?.tenDangNhap} ?: 'N/A'"></span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 dark:text-gray-400" th:text="${phanHoi.khaoSat?.tenKhaoSat} ?: 'N/A'"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 dark:text-gray-400" th:text="${#temporals.format(phanHoi.thoiGianGui, 'dd/MM/yyyy HH:mm')}"></td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300" th:text="${phanHoi.danhSachChiTiet?.size() ?: 0} + ' câu'"></span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                    <div class="flex items-center space-x-2">
                                        <a th:href="@{/admin/phan-hoi/chi-tiet/{id}(id=${phanHoi.phanHoiId})}" 
                                           class="inline-flex items-center px-3 py-1.5 rounded-lg bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 hover:bg-blue-200 dark:hover:bg-blue-800 transition-colors">
                                            <i class="fas fa-eye text-xs mr-1"></i>Xem chi tiết
                                        </a>
                                        <form th:action="@{/admin/phan-hoi/xoa/{id}(id=${phanHoi.phanHoiId})}" 
                                              method="post" 
                                              class="inline"
                                              onsubmit="return confirm('Bạn có chắc chắn muốn xóa phản hồi này? Tất cả chi tiết phản hồi sẽ bị xóa.');">
                                            <button type="submit" class="inline-flex items-center px-3 py-1.5 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 hover:bg-red-200 dark:hover:bg-red-800 transition-colors">
                                                <i class="fas fa-trash text-xs mr-1"></i>Xóa
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${pageInfo == null or pageInfo.content == null or #lists.isEmpty(pageInfo.content)}">
                                <td colspan="6" class="px-6 py-12 text-center">
                                    <div class="flex flex-col items-center">
                                        <i class="fas fa-comments text-4xl text-gray-400 dark:text-gray-500 mb-4"></i>
                                        <p class="text-gray-500 dark:text-gray-400">Không tìm thấy phản hồi nào</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div th:if="${pageInfo != null and pageInfo.totalPages > 1}" 
                     class="px-6 py-4 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
                    <div class="flex items-center justify-between">
                        <div class="text-sm text-gray-700 dark:text-gray-300">
                            Hiển thị <span class="font-semibold" th:text="${pageInfo.currentPage * pageInfo.pageSize + 1}"></span>
                            đến <span class="font-semibold" th:text="${pageInfo.currentPage * pageInfo.pageSize + #lists.size(pageInfo.content)}"></span>
                            trong tổng số <span class="font-semibold" th:text="${pageInfo.totalElements}"></span> kết quả
                        </div>
                        <div class="flex items-center space-x-2">
                            <!-- Previous Button -->
                            <a th:if="${pageInfo.hasPrevious}"
                               th:href="@{/admin/phan-hoi(keyword=${keyword}, khaoSatId=${khaoSatId}, page=${pageInfo.currentPage - 1}, size=${pageInfo.pageSize})}"
                               class="px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-all">
                                <i class="fas fa-chevron-left"></i>
                            </a>
                            <span th:unless="${pageInfo.hasPrevious}"
                                  class="px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500 cursor-not-allowed">
                                <i class="fas fa-chevron-left"></i>
                            </span>
                            
                            <!-- Page Numbers -->
                            <div class="flex items-center space-x-1">
                                <a th:each="i : ${#numbers.sequence(0, pageInfo.totalPages - 1)}"
                                   th:if="${i == pageInfo.currentPage or (i >= pageInfo.currentPage - 2 and i <= pageInfo.currentPage + 2) or i == 0 or i == pageInfo.totalPages - 1}"
                                   th:href="@{/admin/phan-hoi(keyword=${keyword}, khaoSatId=${khaoSatId}, page=${i}, size=${pageInfo.pageSize})}"
                                   th:class="${i == pageInfo.currentPage ? 
                                       'px-4 py-2 bg-gradient-to-r from-red-500 to-rose-600 text-white rounded-lg font-semibold' : 
                                       'px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-all'}"
                                   th:text="${i + 1}">
                                </a>
                                <span th:if="${pageInfo.currentPage > 3}" class="px-2 text-gray-500">...</span>
                                <span th:if="${pageInfo.currentPage < pageInfo.totalPages - 4}" class="px-2 text-gray-500">...</span>
                            </div>
                            
                            <!-- Next Button -->
                            <a th:if="${pageInfo.hasNext}"
                               th:href="@{/admin/phan-hoi(keyword=${keyword}, khaoSatId=${khaoSatId}, page=${pageInfo.currentPage + 1}, size=${pageInfo.pageSize})}"
                               class="px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-all">
                                <i class="fas fa-chevron-right"></i>
                            </a>
                            <span th:unless="${pageInfo.hasNext}"
                                  class="px-4 py-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500 cursor-not-allowed">
                                <i class="fas fa-chevron-right"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
