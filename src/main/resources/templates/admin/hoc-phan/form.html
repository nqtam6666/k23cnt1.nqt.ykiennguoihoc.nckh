<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${hocPhanDTO.hocPhanId != null ? 'Sửa Học phần' : 'Thêm Học phần'}">Thêm Học phần - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="/js/dark-mode.js"></script>
    <style>
        * { transition: all 0.2s ease-in-out; }
        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }
    </style>
</head>
<body class="h-full bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar-v2 :: modernSidebar}"></div>
    
    <!-- Main Content -->
    <div class="ml-64 min-h-screen">
        <!-- Top Bar -->
        <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm">
            <div class="px-8 py-5">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent" th:text="${hocPhanDTO.hocPhanId != null ? 'Sửa Học phần' : 'Thêm Học phần'}"></h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Thông tin học phần</p>
                    </div>
                    <a href="/admin/hoc-phan" class="px-4 py-2 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">
                        <i class="fas fa-arrow-left mr-2"></i>Quay lại
                    </a>
                </div>
            </div>
        </header>
        
        <!-- Page Content -->
        <main class="p-8">
            <!-- Flash Messages -->
            <div th:replace="~{fragments/messages :: messages}"></div>
            
            <!-- Form Card -->
            <div class="max-w-3xl mx-auto">
                <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-2xl shadow-xl border border-gray-200/50 dark:border-gray-700/50 p-8">
                    <form th:action="${hocPhanDTO.hocPhanId != null ? '/admin/hoc-phan/sua/' + hocPhanDTO.hocPhanId : '/admin/hoc-phan/them'}" 
                          th:object="${hocPhanDTO}" 
                          method="post" 
                          class="space-y-6">
                        
                        <div th:if="${hocPhanDTO.hocPhanId != null}">
                            <input type="hidden" th:field="*{hocPhanId}">
                        </div>
                        
                        <div>
                            <label for="tenHocPhan" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                <i class="fas fa-heading mr-2 text-purple-500"></i>Tên học phần <span class="text-red-500">*</span>
                            </label>
                            <input type="text" 
                                   id="tenHocPhan" 
                                   th:field="*{tenHocPhan}"
                                   class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                   placeholder="Nhập tên học phần"
                                   th:classappend="${#fields.hasErrors('tenHocPhan')} ? 'border-red-500'">
                            <p th:if="${#fields.hasErrors('tenHocPhan')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                <span th:errors="*{tenHocPhan}"></span>
                            </p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="soTinChi" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-hashtag mr-2 text-purple-500"></i>Số tín chỉ <span class="text-red-500">*</span>
                                </label>
                                <input type="number" 
                                       id="soTinChi" 
                                       th:field="*{soTinChi}"
                                       min="1"
                                       class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                       placeholder="Nhập số tín chỉ"
                                       th:classappend="${#fields.hasErrors('soTinChi')} ? 'border-red-500'">
                                <p th:if="${#fields.hasErrors('soTinChi')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{soTinChi}"></span>
                                </p>
                            </div>
                            
                            <div>
                                <label for="khoaId" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-building mr-2 text-purple-500"></i>Khoa <span class="text-red-500">*</span>
                                </label>
                                <select id="khoaId" 
                                        th:field="*{khoaId}"
                                        class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                        th:classappend="${#fields.hasErrors('khoaId')} ? 'border-red-500'">
                                    <option value="">-- Chọn khoa --</option>
                                    <option th:each="khoa : ${danhSachKhoa}" 
                                            th:value="${khoa.khoaId}" 
                                            th:text="${khoa.tenKhoa}"></option>
                                </select>
                                <p th:if="${#fields.hasErrors('khoaId')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{khoaId}"></span>
                                </p>
                            </div>
                        </div>
                        
                        <div class="flex justify-end space-x-4 pt-6 border-t border-gray-200 dark:border-gray-700">
                            <a href="/admin/hoc-phan" 
                               class="px-6 py-3 border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 font-medium transition-all">
                                <i class="fas fa-times mr-2"></i>Hủy
                            </a>
                            <button type="submit" 
                                    class="px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-600 text-white rounded-xl hover:from-purple-600 hover:to-pink-700 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all font-medium">
                                <i class="fas fa-save mr-2"></i>Lưu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
