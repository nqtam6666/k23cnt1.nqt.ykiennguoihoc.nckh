<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${nguoiHocDTO.nguoiHocId != null ? 'Sửa Người học' : 'Thêm Người học'}">Thêm Người học - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <style>
        * { transition: all 0.2s ease-in-out; }
        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body class="h-full bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar-v2 :: modernSidebar}"></div>
    
    <!-- Main Content -->
    <div class="page-content min-h-screen">
        <!-- Top Bar -->
        <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm">
            <div class="px-8 py-5">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent" th:text="${nguoiHocDTO.nguoiHocId != null ? 'Sửa Người học' : 'Thêm Người học'}"></h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Thông tin người học</p>
                    </div>
                    <a href="/admin/nguoi-hoc" class="px-4 py-2 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">
                        <i class="fas fa-arrow-left mr-2"></i>Quay lại
                    </a>
                </div>
            </div>
        </header>
        
        <!-- Page Content -->
        <main class="p-8">
            <!-- Flash Messages -->
            <div th:replace="~{fragments/messages :: messages}"></div>
            
            <!-- Form Card -->
            <div class="max-w-4xl mx-auto">
                <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-2xl shadow-xl border border-gray-200/50 dark:border-gray-700/50 p-8">
                    <form th:action="${nguoiHocDTO.nguoiHocId != null ? '/admin/nguoi-hoc/sua/' + nguoiHocDTO.nguoiHocId : '/admin/nguoi-hoc/them'}" 
                          th:object="${nguoiHocDTO}" 
                          method="post" 
                          class="space-y-6">
                        
                        <div th:if="${nguoiHocDTO.nguoiHocId != null}">
                            <input type="hidden" th:field="*{nguoiHocId}">
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="tenDangNhap" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-user mr-2 text-indigo-500"></i>Tên đăng nhập <span class="text-red-500">*</span>
                                </label>
                                <input type="text" 
                                       id="tenDangNhap" 
                                       th:field="*{tenDangNhap}"
                                       class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                       placeholder="Nhập tên đăng nhập"
                                       th:readonly="${nguoiHocDTO.nguoiHocId != null}"
                                       th:classappend="${#fields.hasErrors('tenDangNhap')} ? 'border-red-500'">
                                <p th:if="${#fields.hasErrors('tenDangNhap')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{tenDangNhap}"></span>
                                </p>
                            </div>
                            
                            <div th:if="${nguoiHocDTO.nguoiHocId == null}">
                                <label for="matKhau" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-lock mr-2 text-indigo-500"></i>Mật khẩu <span class="text-red-500">*</span>
                                </label>
                                <input type="password" 
                                       id="matKhau" 
                                       th:field="*{matKhau}"
                                       autocomplete="new-password"
                                       class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                       placeholder="Nhập mật khẩu"
                                       th:classappend="${#fields.hasErrors('matKhau')} ? 'border-red-500'">
                                <p th:if="${#fields.hasErrors('matKhau')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{matKhau}"></span>
                                </p>
                            </div>
                            
                            <div th:if="${nguoiHocDTO.nguoiHocId != null}">
                                <label for="matKhau" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-lock mr-2 text-indigo-500"></i>Mật khẩu mới (để trống nếu không đổi)
                                </label>
                                <input type="password" 
                                       id="matKhau" 
                                       name="matKhau"
                                       autocomplete="new-password"
                                       class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                       placeholder="Nhập mật khẩu mới">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-venus-mars mr-2 text-indigo-500"></i>Giới tính <span class="text-red-500">*</span>
                                </label>
                                <div class="flex space-x-4">
                                    <label class="flex items-center p-3 rounded-xl border-2 border-gray-300 dark:border-gray-600 hover:border-indigo-500 dark:hover:border-indigo-500 cursor-pointer transition-all" 
                                           th:classappend="${nguoiHocDTO?.gioiTinh == true} ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20' : ''">
                                        <input type="radio" 
                                               th:field="*{gioiTinh}" 
                                               th:value="true"
                                               class="mr-2">
                                        <span class="text-gray-700 dark:text-gray-300 font-medium">Nam</span>
                                    </label>
                                    <label class="flex items-center p-3 rounded-xl border-2 border-gray-300 dark:border-gray-600 hover:border-indigo-500 dark:hover:border-indigo-500 cursor-pointer transition-all"
                                           th:classappend="${nguoiHocDTO?.gioiTinh == false} ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20' : ''">
                                        <input type="radio" 
                                               th:field="*{gioiTinh}" 
                                               th:value="false"
                                               class="mr-2">
                                        <span class="text-gray-700 dark:text-gray-300 font-medium">Nữ</span>
                                    </label>
                                </div>
                                <p th:if="${#fields.hasErrors('gioiTinh')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{gioiTinh}"></span>
                                </p>
                            </div>
                            
                            <div>
                                <label for="namSinh" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-calendar mr-2 text-indigo-500"></i>Năm sinh <span class="text-red-500">*</span>
                                </label>
                                <input type="number" 
                                       id="namSinh" 
                                       th:field="*{namSinh}"
                                       min="1950"
                                       max="2010"
                                       class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                       placeholder="VD: 2003"
                                       th:classappend="${#fields.hasErrors('namSinh')} ? 'border-red-500'">
                                <p th:if="${#fields.hasErrors('namSinh')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{namSinh}"></span>
                                </p>
                            </div>
                        </div>
                        
                        <div>
                            <label for="khoaId" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                <i class="fas fa-building mr-2 text-indigo-500"></i>Khoa <span class="text-red-500">*</span>
                            </label>
                            <select id="khoaId" 
                                    th:field="*{khoaId}"
                                    class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                    th:classappend="${#fields.hasErrors('khoaId')} ? 'border-red-500'">
                                <option value="">-- Chọn khoa --</option>
                                <option th:each="khoa : ${danhSachKhoa}" 
                                        th:value="${khoa.khoaId}" 
                                        th:text="${khoa.tenKhoa}"></option>
                            </select>
                            <p th:if="${#fields.hasErrors('khoaId')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                <span th:errors="*{khoaId}"></span>
                            </p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="nganhHoc" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-book-reader mr-2 text-indigo-500"></i>Ngành học <span class="text-red-500">*</span>
                                </label>
                                <input type="text" 
                                       id="nganhHoc" 
                                       th:field="*{nganhHoc}"
                                       class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                       placeholder="VD: Công nghệ Thông tin"
                                       th:classappend="${#fields.hasErrors('nganhHoc')} ? 'border-red-500'">
                                <p th:if="${#fields.hasErrors('nganhHoc')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{nganhHoc}"></span>
                                </p>
                            </div>
                            
                            <div>
                                <label for="khoaHoc" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-graduation-cap mr-2 text-indigo-500"></i>Khóa học <span class="text-red-500">*</span>
                                </label>
                                <input type="text" 
                                       id="khoaHoc" 
                                       th:field="*{khoaHoc}"
                                       class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                       placeholder="VD: K23, K24"
                                       th:classappend="${#fields.hasErrors('khoaHoc')} ? 'border-red-500'">
                                <p th:if="${#fields.hasErrors('khoaHoc')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{khoaHoc}"></span>
                                </p>
                            </div>
                        </div>
                        
                        <div class="flex justify-end space-x-4 pt-6 border-t border-gray-200 dark:border-gray-700">
                            <a href="/admin/nguoi-hoc" 
                               class="px-6 py-3 border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 font-medium transition-all">
                                <i class="fas fa-times mr-2"></i>Hủy
                            </a>
                            <button type="submit" 
                                    class="px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl hover:from-indigo-600 hover:to-purple-700 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all font-medium">
                                <i class="fas fa-save mr-2"></i>Lưu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
