<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${phanCongDTO.phanCongId != null ? 'Sửa Phân công' : 'Thêm Phân công'}">Thêm Phân công - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="/js/dark-mode.js"></script>
    <style>
        * { transition: all 0.2s ease-in-out; }
        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1);
        }
    </style>
</head>
<body class="h-full bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar-v2 :: modernSidebar}"></div>
    
    <!-- Main Content -->
    <div class="ml-64 min-h-screen">
        <!-- Top Bar -->
        <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm">
            <div class="px-8 py-5">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold bg-gradient-to-r from-yellow-600 to-orange-600 bg-clip-text text-transparent" th:text="${phanCongDTO.phanCongId != null ? 'Sửa Phân công' : 'Thêm Phân công'}"></h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Thông tin phân công</p>
                    </div>
                    <a href="/admin/phan-cong" class="px-4 py-2 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">
                        <i class="fas fa-arrow-left mr-2"></i>Quay lại
                    </a>
                </div>
            </div>
        </header>
        
        <!-- Page Content -->
        <main class="p-8">
            <!-- Flash Messages -->
            <div th:replace="~{fragments/messages :: messages}"></div>
            
            <!-- Form Card -->
            <div class="max-w-3xl mx-auto">
                <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-2xl shadow-xl border border-gray-200/50 dark:border-gray-700/50 p-8">
                    <form th:action="${phanCongDTO.phanCongId != null ? '/admin/phan-cong/sua/' + phanCongDTO.phanCongId : '/admin/phan-cong/them'}" 
                          th:object="${phanCongDTO}" 
                          method="post" 
                          class="space-y-6">
                        
                        <div th:if="${phanCongDTO.phanCongId != null}">
                            <input type="hidden" th:field="*{phanCongId}">
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="giangVienId" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-chalkboard-teacher mr-2 text-yellow-500"></i>Giảng viên <span class="text-red-500">*</span>
                                </label>
                                <select id="giangVienId" 
                                        th:field="*{giangVienId}"
                                        class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                        th:classappend="${#fields.hasErrors('giangVienId')} ? 'border-red-500'">
                                    <option value="">-- Chọn giảng viên --</option>
                                    <option th:each="gv : ${danhSachGiangVien}" 
                                            th:value="${gv.giangVienId}" 
                                            th:text="${gv.hoTen + ' (' + gv.nguoiDung.tenDangNhap + ')'}"></option>
                                </select>
                                <p th:if="${#fields.hasErrors('giangVienId')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{giangVienId}"></span>
                                </p>
                            </div>
                            
                            <div>
                                <label for="hocPhanId" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-book mr-2 text-yellow-500"></i>Học phần <span class="text-red-500">*</span>
                                </label>
                                <select id="hocPhanId" 
                                        th:field="*{hocPhanId}"
                                        class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                        th:classappend="${#fields.hasErrors('hocPhanId')} ? 'border-red-500'">
                                    <option value="">-- Chọn học phần --</option>
                                    <option th:each="hp : ${danhSachHocPhan}" 
                                            th:value="${hp.hocPhanId}" 
                                            th:text="${hp.tenHocPhan + ' (' + hp.soTinChi + ' TC)'}"></option>
                                </select>
                                <p th:if="${#fields.hasErrors('hocPhanId')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                    <span th:errors="*{hocPhanId}"></span>
                                </p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="hocKy" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-calendar-alt mr-2 text-yellow-500"></i>Học kỳ
                                </label>
                                <input type="text" 
                                       id="hocKy" 
                                       th:field="*{hocKy}"
                                       class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                       placeholder="VD: Học kỳ 1, Học kỳ 2">
                            </div>
                            
                            <div>
                                <label for="namHoc" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                    <i class="fas fa-calendar mr-2 text-yellow-500"></i>Năm học
                                </label>
                                <input type="text" 
                                       id="namHoc" 
                                       th:field="*{namHoc}"
                                       class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                       placeholder="VD: 2024-2025">
                            </div>
                        </div>
                        
                        <div class="flex justify-end space-x-4 pt-6 border-t border-gray-200 dark:border-gray-700">
                            <a href="/admin/phan-cong" 
                               class="px-6 py-3 border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 font-medium transition-all">
                                <i class="fas fa-times mr-2"></i>Hủy
                            </a>
                            <button type="submit" 
                                    class="px-6 py-3 bg-gradient-to-r from-yellow-500 to-orange-600 text-white rounded-xl hover:from-yellow-600 hover:to-orange-700 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all font-medium">
                                <i class="fas fa-save mr-2"></i>Lưu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
