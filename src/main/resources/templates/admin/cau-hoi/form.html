<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${cauHoiDTO?.cauHoiId != null ? 'Sửa Câu hỏi' : 'Thêm Câu hỏi'}">Thêm Câu hỏi - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/meo.ico}">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="/js/dark-mode.js"></script>
    <style>
        * { transition: all 0.2s ease-in-out; }
        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="h-full bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar-v2 :: modernSidebar}"></div>
    
    <!-- Main Content -->
    <div class="ml-64 min-h-screen">
        <!-- Top Bar -->
        <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm">
            <div class="px-8 py-5">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent" th:text="${cauHoiDTO?.cauHoiId != null ? 'Sửa Câu hỏi' : 'Thêm Câu hỏi'}"></h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" th:if="${khaoSat}" th:text="'Khảo sát: ' + ${khaoSat?.tenKhaoSat}"></p>
                    </div>
                    <a th:href="@{/admin/khao-sat/{id}/cau-hoi(id=${cauHoiDTO?.khaoSatId ?: khaoSat?.khaoSatId})}" class="px-4 py-2 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">
                        <i class="fas fa-arrow-left mr-2"></i>Quay lại
                    </a>
                </div>
            </div>
        </header>
        
        <!-- Page Content -->
        <main class="p-8">
            <!-- Flash Messages -->
            <div th:replace="~{fragments/messages :: messages}"></div>
            
            <!-- Info Card -->
            <div th:if="${khaoSat}" class="mb-6 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl p-4">
                <p class="text-sm text-blue-800 dark:text-blue-200 flex items-center">
                    <i class="fas fa-info-circle mr-2"></i>
                    <span>Khảo sát: <span class="font-semibold" th:text="${khaoSat?.tenKhaoSat}"></span></span>
                </p>
            </div>
            
            <!-- Form Card -->
            <div class="max-w-3xl mx-auto">
                <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-2xl shadow-xl border border-gray-200/50 dark:border-gray-700/50 p-8">
                    <form th:action="${cauHoiDTO?.cauHoiId != null ? '/admin/cau-hoi/sua/' + cauHoiDTO.cauHoiId : '/admin/cau-hoi/them'}" 
                          th:object="${cauHoiDTO}" 
                          method="post" 
                          class="space-y-6">
                        
                        <div th:if="${cauHoiDTO?.cauHoiId != null}">
                            <input type="hidden" th:field="*{cauHoiId}">
                        </div>
                        <input type="hidden" th:field="*{khaoSatId}" th:value="${cauHoiDTO?.khaoSatId ?: khaoSat?.khaoSatId}">
                        
                        <div>
                            <label for="nhomDichVuId" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                <i class="fas fa-layer-group mr-2 text-blue-500"></i>Nhóm dịch vụ <span class="text-red-500">*</span>
                            </label>
                            <select id="nhomDichVuId" 
                                    th:field="*{nhomDichVuId}"
                                    class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                    th:classappend="${#fields.hasErrors('nhomDichVuId')} ? 'border-red-500'">
                                <option value="">-- Chọn nhóm dịch vụ --</option>
                                <option th:each="nhom : ${danhSachNhomDichVu}" 
                                        th:value="${nhom.nhomDichVuId}" 
                                        th:text="${nhom.tenDichVu}"></option>
                            </select>
                            <p th:if="${#fields.hasErrors('nhomDichVuId')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                <span th:errors="*{nhomDichVuId}"></span>
                            </p>
                        </div>
                        
                        <div>
                            <label for="noiDung" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                <i class="fas fa-align-left mr-2 text-blue-500"></i>Nội dung câu hỏi <span class="text-red-500">*</span>
                            </label>
                            <textarea id="noiDung" 
                                      th:field="*{noiDung}"
                                      rows="4"
                                      class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white resize-none"
                                      placeholder="Nhập nội dung câu hỏi..."
                                      th:classappend="${#fields.hasErrors('noiDung')} ? 'border-red-500'"></textarea>
                            <p th:if="${#fields.hasErrors('noiDung')}" class="mt-1 text-sm text-red-600 dark:text-red-400">
                                <span th:errors="*{noiDung}"></span>
                            </p>
                        </div>
                        
                        <div>
                            <label for="loaiThangDo" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                                <i class="fas fa-ruler mr-2 text-blue-500"></i>Loại thang đo
                            </label>
                            <select id="loaiThangDo" 
                                    th:field="*{loaiThangDo}"
                                    class="form-input w-full px-4 py-3 border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                                <option value="Likert 1-5">Likert 1-5</option>
                                <option value="Likert 1-7">Likert 1-7</option>
                                <option value="Yes/No">Yes/No</option>
                                <option value="Text">Text</option>
                            </select>
                        </div>
                        
                        <div class="flex justify-end space-x-4 pt-6 border-t border-gray-200 dark:border-gray-700">
                            <a th:href="@{/admin/khao-sat/{id}/cau-hoi(id=${cauHoiDTO?.khaoSatId ?: khaoSat?.khaoSatId})}" 
                               class="px-6 py-3 border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 font-medium transition-all">
                                <i class="fas fa-times mr-2"></i>Hủy
                            </a>
                            <button type="submit" 
                                    class="px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-xl hover:from-blue-600 hover:to-indigo-700 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all font-medium">
                                <i class="fas fa-save mr-2"></i>Lưu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
