spring.application.name=k23cnt1.nguyenquangtam.nckh
# port: 8080
server.port=8080
# Microsoft SQL Server Database
spring.datasource.url=jdbc:sqlserver://localhost:1434;databaseName=NCKH_FeedBack_NguoiHoc_db;integratedSecurity=true;encrypt=false;trustServerCertificate=true;
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.username=
spring.datasource.password=

# Hibernate settings/JPA properties
spring.jpa.show-sql=true
# Dùng update để giữ lại dữ liệu khi khởi động lại
# Chỉ dùng create khi cần tạo lại database từ đầu
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# UTF-8 encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# Thymeleaf cache
spring.thymeleaf.cache=false

# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
# jwt.secret sẽ được load từ application-local.properties
jwt.expiration=86400000

# JPA Open-in-View
spring.jpa.open-in-view=false

# Thymeleaf template location check
spring.thymeleaf.check-template-location=false
